# Production stack — Bhumi Land Registry
# Usage: copy .env.production.example to .env and run:
#   docker compose -f docker-compose.prod.yml up -d

services:
  mongodb:
    image: mongo:7
    container_name: bhumi-mongodb
    restart: unless-stopped
    volumes:
      - bhumi_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: bhumi
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    image: panther0027/bhumi-land-registry-api:latest
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bhumi-api
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - .env
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/bhumi
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - bhumi_uploads:/app/uploads
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/api/health']
      interval: 15s
      timeout: 5s
      retries: 3

  client:
    image: panther0027/bhumi-land-registry-web:latest
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: bhumi-web
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - server

volumes:
  bhumi_mongo_data:
  bhumi_uploads:
