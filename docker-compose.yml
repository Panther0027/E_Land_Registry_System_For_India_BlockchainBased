version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: bhumi-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - bhumi_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: bhumi

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: bhumi-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/bhumi
      JWT_SECRET: ${JWT_SECRET:-bhumi-dev-secret-change-in-production}
      JWT_EXPIRES_IN: 7d
      AADHAAR_SALT: ${AADHAAR_SALT:-bhumi-aadhaar-salt}
      CLIENT_URL: http://localhost:5173
      SEPOLIA_RPC_URL: ${SEPOLIA_RPC_URL:-}
      PRIVATE_KEY: ${PRIVATE_KEY:-}
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS:-}
      PINATA_API_KEY: ${PINATA_API_KEY:-}
      PINATA_SECRET_KEY: ${PINATA_SECRET_KEY:-}
    depends_on:
      - mongodb
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: bhumi-client
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - server

volumes:
  bhumi_mongo_data:
