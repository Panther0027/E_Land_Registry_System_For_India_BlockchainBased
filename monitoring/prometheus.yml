global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'bhumi-jenkins-monitor'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'jenkins'
    metrics_path: '/prometheus'
    static_configs:
      - targets: ['jenkins:8080']
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'docker'
    static_configs:
      - targets: ['localhost:9323']
